# Vhost del nginx_proxy compartido para la API ÚNICA de EffiCarBroker.
# Un solo backend sirve a TODOS los tenants; el tenant se deriva del JWT, no del
# dominio, así que este host es común a todos los fronts.
# Termina TLS con el cert wildcard *.effi4tech.cl y proxea a efficar_backend:8000.
# Aquí quedan expuestos: /docs y /redoc (protegidos), /api/v1 y /media.
#
# Instalar una sola vez en el VPS:
#   cp nginx-efficar-api.conf /root/docker/nginx-proxy/conf.d/efficar-api.conf
#   # crear la credencial de la doc (usuario "docs", pide clave):
#   printf 'docs:%s\n' "$(openssl passwd -apr1)" \
#       > /root/docker/nginx-proxy/conf.d/efficar-docs.htpasswd
#   docker exec nginx_proxy nginx -t && docker exec nginx_proxy nginx -s reload

# Freno a fuerza bruta / credential-stuffing contra el login (endpoint único de
# TODOS los tenants). Zona a nivel http; nombre propio para no chocar con otras.
# rate=30r/m ≈ 1 intento cada 2 s por IP; súbelo/bájalo según tus oficinas con NAT.
limit_req_zone $binary_remote_addr zone=efficar_login:10m rate=30r/m;

server {
    listen 80;
    server_name efficar-api.effi4tech.cl;

    # Renovación de certificados (certbot webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name efficar-api.effi4tech.cl;

    # Wildcard *.effi4tech.cl (cert compartido effi4tech.cl-0001).
    ssl_certificate     /etc/letsencrypt/live/effi4tech.cl-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/effi4tech.cl-0001/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Subir fotos de la galería: permite archivos hasta el límite del backend (10 MB).
    client_max_body_size 12m;

    # Resolución DNS dinámica del backend: el DNS embebido de Docker (127.0.0.11).
    # Con `set $backend` + variable en proxy_pass, nginx re-resuelve en runtime, así
    # que sobrevive a que el deploy recree efficar_backend con una IP nueva SIN
    # necesitar recargar nginx_proxy (evita el 502 tras cada despliegue).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $efficar_backend "efficar_backend:8000";

    # Cabeceras de seguridad para todo el vhost (las hereda cada location que no
    # defina add_header propio).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Parámetros de proxy comunes (heredados por los location de abajo, que no
    # redefinen ningún proxy_set_header).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Login: limitado por tasa. burst absorbe reintentos legítimos; 429 al pasarse.
    location = /api/v1/auth/login {
        limit_req zone=efficar_login burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://$efficar_backend;
    }

    # Documentación de la API: protegida con usuario/clave (htpasswd).
    # Mismo realm en las 3 rutas para que el navegador reutilice la credencial:
    # /docs (Swagger UI) carga /api/v1/openapi.json desde el mismo origen.
    location = /docs {
        auth_basic "EffiCarBroker API";
        auth_basic_user_file /etc/nginx/conf.d/efficar-docs.htpasswd;
        proxy_pass http://$efficar_backend;
    }
    location = /redoc {
        auth_basic "EffiCarBroker API";
        auth_basic_user_file /etc/nginx/conf.d/efficar-docs.htpasswd;
        proxy_pass http://$efficar_backend;
    }
    location = /api/v1/openapi.json {
        auth_basic "EffiCarBroker API";
        auth_basic_user_file /etc/nginx/conf.d/efficar-docs.htpasswd;
        proxy_pass http://$efficar_backend;
    }

    # Resto de la API (endpoints con Bearer token) y /media.
    location / {
        proxy_pass http://$efficar_backend;
    }
}
