# Plantilla de vhost de TENANT para el nginx_proxy compartido del VPS.
# El placeholder TENANT_SLUG lo reemplaza scripts/add-tenant.sh.
# Termina TLS con el cert wildcard *.effi4tech.cl y proxea a efficar_frontend.

server {
    listen 80;
    server_name efficar-TENANT_SLUG.effi4tech.cl;

    # Renovación de certificados (certbot webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name efficar-TENANT_SLUG.effi4tech.cl;

    # Wildcard *.effi4tech.cl (cert compartido effi4tech.cl-0001).
    ssl_certificate     /etc/letsencrypt/live/effi4tech.cl-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/effi4tech.cl-0001/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://efficar_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
