# nginx que sirve el SPA del backoffice y proxea al backend en el mismo origen.
# El backend es alcanzable como `backend:8000` en la red interna de compose.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API versionada -> backend
    location /api/v1 {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos subidos de la galería (servidos por el backend vía StaticFiles).
    location /media {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PWA: manifest e iconos host-aware -> backend (resuelve el tenant por Host).
    # Deben ir ANTES de la regla regex de assets: los iconos terminan en `.png` y
    # el manifest lo tragaría el fallback SPA. `= ` (exacto) y `^~` (prefijo con
    # prioridad sobre regex) garantizan que ganen a `location ~* \.png$`.
    location = /manifest.webmanifest {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /app-icons/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentación de FastAPI.
    location ~ ^/(docs|redoc)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets con hash de Vite: cache larga e inmutable.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback del SPA: cualquier ruta desconocida sirve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
